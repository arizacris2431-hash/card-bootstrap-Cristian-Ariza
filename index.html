<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card-Presentacion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="contenedor">
        <div class="card color-card" style="width: 21rem;">
            <img src="foto.png" alt="foto-presentacion" class="rounded-circle img-fluid shadow-sm foto-perfil">
            <div class="card-body">
                <h4 class="card-title">Cristian Ariza</h4>
                <h5>Backend Developer</h5>
                <p class="card-text">Apasionado por la arquitectura de software, la lógica de bases de datos y la optimización de procesos.</p>
            </div>
            
            <div class="card-body">
                <a href="#" class="card-link">GitHub</a>
                <a href="#" class="card-link">LinkedIn</a>
                <a href="#" class="card-link">Gmail</a>
            </div>
        </div>
    </section>
    
</body>
</html>
